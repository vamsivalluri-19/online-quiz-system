<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="css/style.css">

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.auth-box{
width:400px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
border:none;
background:#3498db;
color:white;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.link{
text-align:center;
margin-top:15px;
}

a{
text-decoration:none;
color:#3498db;
}

.role-select{
display:flex;
gap:10px;
margin-bottom:15px;
}

.role-select button{
flex:1;
}

.student-btn{
background:#27ae60;
}

.staff-btn{
background:#8e44ad;
}

</style>

</head>

<body class="auth-page">

<div class="auth-box">

<h1>Login</h1>

<div class="role-select">

<button class="student-btn"
onclick="setRole('student')">

Student

</button>

<button class="staff-btn"
onclick="setRole('staff')">

Staff

</button>

</div>

<input type="email"
id="email"
placeholder="Enter Email">

<input type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<div class="link">

Don't have an account?

<a href="register.html">
Register Here
</a>

</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
