<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quiz Result</title>

<link rel="stylesheet"
href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
transition:0.4s;
}

body.dark{
background:#121212;
color:white;
}

.container{
width:90%;
max-width:750px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
transition:0.4s;
}

body.dark .container{
background:#1f1f1f;
color:white;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
margin:10px;
}

.play-btn{
background:green;
color:white;
}

.logout-btn{
background:#e74c3c;
color:white;
}

.dark-btn{
background:#2c3e50;
color:white;
}

.result-box{
margin-top:20px;
padding:25px;
background:#f9f9f9;
border-radius:10px;
}

body.dark .result-box{
background:#2b2b2b;
}

.result-box p{
margin:15px 0;
font-size:18px;
}

.score{
font-size:45px;
font-weight:bold;
color:green;
margin:20px 0;
}

.performance{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.mode-box{
display:inline-block;
background:#3498db;
color:white;
padding:10px 20px;
border-radius:20px;
margin-top:10px;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

body.dark .stat-card{
background:#3a3a3a;
}

.stat-card h3{
margin-bottom:10px;
}

@media(max-width:600px){

.stats{
grid-template-columns:1fr;
}

}

</style>

</head>

<body class="result-page">

<div class="container">

<div class="top-bar">

<button class="dark-btn"
onclick="toggleDarkMode()">

🌙 Dark Mode

</button>

<button class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<h1>Quiz Result 🎉</h1>

<div class="result-box">

<h2 id="student-name"></h2>

<h3 id="student-email"></h3>

<div class="mode-box"
id="mode">

</div>

<div class="score"
id="score">

</div>

<div class="stats">

<div class="stat-card">

<h3>Percentage</h3>

<p id="percentage"></p>

</div>

<div class="stat-card">

<h3>Correct Answers</h3>

<p id="correct"></p>

</div>

<div class="stat-card">

<h3>Wrong Answers</h3>

<p id="wrong"></p>

</div>

<div class="stat-card">

<h3>Attempted</h3>

<p id="attempted"></p>

</div>

<div class="stat-card">

<h3>High Score</h3>

<p id="high-score"></p>

</div>

<div class="stat-card">

<h3>Performance</h3>

<p class="performance"
id="performance">

</p>

</div>

</div>

</div>

<a href="index.html">

<button class="play-btn">

Play Again

</button>

</a>

</div>

<script src="js/result.js"></script>

</body>
</html>
